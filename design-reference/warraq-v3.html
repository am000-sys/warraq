<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وَرَّاق — تحويل الكتب العربية إلى نصوص</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #f7f7f7;
  color: #000;
  font-family: 'Tajawal', sans-serif;
  -webkit-font-smoothing: antialiased;
  direction: rtl;
}

:root {
  --fog:        #f7f7f7;
  --snow:       #ffffff;
  --carbon:     #000000;
  --midnight:   #181825;
  --slate:      #242433;
  --graphite:   #484758;
  --stone:      #636363;
  --pebble:     #949494;
  --ash:        #8b8b8b;
  --orange:     #f69251;
  --orange-soft: rgba(246,146,81,0.10);
  --orange-mid:  rgba(246,146,81,0.18);
  --border:     #e8e8e8;
  --border-sub: #f0f0f0;

  --r-btn:   28px;
  --r-card:  24px;
  --r-badge: 100px;
  --r-nav:   32px;
  --r-inner: 12px;

  --shadow-card: rgba(24,24,37,0.10) 0px 2px 8px -2px;
  --shadow-btn:  rgba(0,0,0,0.06) 0px 2px 8px, rgba(0,0,0,0.04) 0px 1px 2px;
  --shadow-nav:  rgba(24,24,37,0.08) 0px 4px 20px -4px;
}

.container { max-width: 1160px; margin: 0 auto; padding: 0 28px; }

/* Buttons */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--orange); color: var(--carbon);
  border: none; border-radius: var(--r-btn);
  padding: 13px 28px;
  font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 500;
  cursor: pointer; box-shadow: var(--shadow-btn);
  transition: all 0.18s ease; text-decoration: none; white-space: nowrap;
}
.btn-primary:hover { filter: brightness(1.05); transform: translateY(-1px); box-shadow: rgba(246,146,81,0.30) 0px 6px 20px; }

.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--snow); color: var(--carbon);
  border: 1px solid var(--border); border-radius: var(--r-btn);
  padding: 13px 28px;
  font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 400;
  cursor: pointer; transition: all 0.18s ease; text-decoration: none; white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--orange); }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--snow); border: 1px solid var(--border);
  border-radius: var(--r-badge); padding: 5px 14px;
  font-size: 12px; font-weight: 500; color: var(--graphite);
  font-family: 'Tajawal', sans-serif;
}

.card {
  background: var(--snow); border-radius: var(--r-card);
  box-shadow: var(--shadow-card); border: 1px solid var(--border-sub);
  padding: 28px;
}

@keyframes scan-line { 0%{top:12px} 85%{top:calc(100% - 12px)} 100%{top:12px} }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
@keyframes fade-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════════════════════════
   LOGO — كتاب + إطار مسح + اسم
══════════════════════════════════ */
function Logo({ size = 1, inverted = false }) {
  const orange = '#f69251';
  const fg = inverted ? '#fff' : '#000';
  const lineFg = inverted ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.20)';
  const iconSize = 40 * size;

  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10 * size, textDecoration: 'none' }}>
      {/* Icon */}
      <svg width={iconSize} height={iconSize} viewBox="0 0 40 40" fill="none">
        {/* Corner frame — scanning bracket */}
        <path d="M3 11 L3 3 L11 3" stroke={orange} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M29 3 L37 3 L37 11" stroke={orange} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M37 29 L37 37 L29 37" stroke={orange} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M11 37 L3 37 L3 29" stroke={orange} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Open book */}
        <path d="M20 30 C17 28.5 11 28 7 29 L7 12 C11 11 17 11.5 20 13 C23 11.5 29 11 33 12 L33 29 C29 28 23 28.5 20 30Z"
          fill="none" stroke={fg} strokeWidth="1.5" strokeLinejoin="round" opacity="0.85"/>
        <line x1="20" y1="13" x2="20" y2="30" stroke={fg} strokeWidth="1.3" opacity="0.7"/>
        {/* Left page lines */}
        <line x1="9" y1="17" x2="18" y2="16.5" stroke={lineFg} strokeWidth="1.2" strokeLinecap="round"/>
        <line x1="9" y1="20.5" x2="18" y2="20" stroke={lineFg} strokeWidth="1.2" strokeLinecap="round"/>
        <line x1="9" y1="24" x2="16" y2="23.6" stroke={lineFg} strokeWidth="1.2" strokeLinecap="round"/>
        {/* Right page lines — orange tint (the extracted text side) */}
        <line x1="22" y1="16.5" x2="31" y2="17" stroke={orange} strokeWidth="1.4" strokeLinecap="round"/>
        <line x1="22" y1="20" x2="31" y2="20.5" stroke={orange} strokeWidth="1.2" strokeLinecap="round" opacity="0.6"/>
        <line x1="22" y1="23.6" x2="29" y2="24" stroke={orange} strokeWidth="1.1" strokeLinecap="round" opacity="0.4"/>
      </svg>
      {/* Wordmark */}
      <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1 }}>
        <span style={{
          fontFamily: 'Tajawal, sans-serif',
          fontSize: 22 * size, fontWeight: 500,
          color: fg, letterSpacing: '-0.02em',
        }}>وَرَّاق</span>
        <span style={{
          fontFamily: 'Inter, sans-serif',
          fontSize: 9 * size, fontWeight: 400,
          color: inverted ? 'rgba(255,255,255,0.4)' : '#949494',
          letterSpacing: '0.14em', textTransform: 'uppercase', marginTop: 1,
        }}>Warraq</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   NAV
══════════════════════════════════ */
function Nav({ onNavigate }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 48);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <div style={{ position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)', width: 'calc(100% - 48px)', maxWidth: 1120, zIndex: 100 }}>
      <nav style={{
        background: scrolled ? 'rgba(255,255,255,0.97)' : 'var(--snow)',
        borderRadius: scrolled ? 'var(--r-nav)' : '16px',
        boxShadow: scrolled ? 'var(--shadow-nav)' : 'rgba(24,24,37,0.06) 0px 1px 4px',
        border: '1px solid var(--border-sub)',
        backdropFilter: 'blur(12px)',
        padding: '0 24px', height: 60,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24,
        transition: 'all 0.3s ease',
      }}>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('landing'); }} style={{ textDecoration: 'none' }}>
          <Logo size={0.82} />
        </a>
        <ul style={{ display: 'flex', alignItems: 'center', gap: 32, listStyle: 'none' }}>
          {[
            { l: 'المميزات', k: 'landing' },
            { l: 'كيف يعمل', k: 'landing' },
            { l: 'الأسعار', k: 'pricing' },
            { l: 'API', k: 'landing' },
          ].map(item => (
            <li key={item.l}>
              <a href="#" onClick={e => { e.preventDefault(); onNavigate(item.k); }}
                style={{ fontSize: 14, fontWeight: 400, color: 'var(--stone)', textDecoration: 'none', fontFamily: 'Tajawal, sans-serif', transition: 'color 0.15s' }}
                onMouseEnter={e => e.target.style.color = '#000'}
                onMouseLeave={e => e.target.style.color = 'var(--stone)'}
              >{item.l}</a>
            </li>
          ))}
        </ul>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <a href="#" onClick={e => { e.preventDefault(); onNavigate('login'); }}
            style={{ fontSize: 14, fontWeight: 500, color: 'var(--carbon)', textDecoration: 'none', padding: '8px 16px', borderRadius: 'var(--r-btn)', transition: 'background 0.15s', fontFamily: 'Tajawal, sans-serif' }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--fog)'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
          >تسجيل الدخول</a>
          <button className="btn-primary" style={{ fontSize: 14, padding: '10px 22px' }} onClick={() => onNavigate('register')}>ابدأ مجاناً</button>
        </div>
      </nav>
    </div>
  );
}

/* ══════════════════════════════════
   BOOK → TEXT MOCKUP (hero visual)
══════════════════════════════════ */
function BookToTextMockup() {
  const [scanPos, setScanPos] = useState(0);
  const [textVisible, setTextVisible] = useState(0);

  useEffect(() => {
    let pos = 0;
    let chars = 0;
    const t = setInterval(() => {
      pos = pos >= 100 ? 0 : pos + 1.2;
      chars = pos >= 100 ? 0 : Math.min(chars + 3, 100);
      setScanPos(pos);
      setTextVisible(chars);
    }, 35);
    return () => clearInterval(t);
  }, []);

  const sampleLines = [
    { text: 'بسم الله الرحمن الرحيم', highlight: true },
    { text: 'قال الإمام ابن تيمية رحمه الله', highlight: false },
    { text: 'في فتاواه الكبرى أن الواجب', highlight: false },
    { text: 'على كل مسلم أن يتعلم من أمور', highlight: false },
    { text: 'دينه ما لا يسعه جهله...', highlight: false },
  ];

  return (
    <div style={{ width: '100%', maxWidth: 880, margin: '0 auto' }}>
      {/* Outer card */}
      <div style={{ background: 'var(--snow)', borderRadius: 24, boxShadow: '0 4px 40px rgba(0,0,0,0.08), 0 1px 0 rgba(0,0,0,0.04)', border: '1px solid var(--border-sub)', overflow: 'hidden' }}>
        {/* Browser bar */}
        <div style={{ background: 'var(--fog)', borderBottom: '1px solid var(--border-sub)', padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#c97b84' }}></div>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#f69251' }}></div>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#6dbd7a' }}></div>
          <div style={{ flex: 1, marginRight: 12 }}>
            <div style={{ background: 'var(--snow)', border: '1px solid var(--border)', borderRadius: 6, height: 24, display: 'flex', alignItems: 'center', padding: '0 12px', fontSize: 11, color: 'var(--pebble)', fontFamily: 'Inter, sans-serif', direction: 'ltr', maxWidth: 260 }}>
              app.warraq.sa/jobs/J-1001/results
            </div>
          </div>
        </div>

        {/* Main content: two panels */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 56px 1fr', minHeight: 300 }}>

          {/* LEFT: scanned page */}
          <div style={{ padding: '20px', borderLeft: '1px solid var(--border-sub)', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
              <span style={{ fontSize: 11, color: 'var(--pebble)', fontFamily: 'Tajawal, sans-serif' }}>الصفحة الأصلية</span>
              <span style={{ fontSize: 10, background: 'var(--fog)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 8px', color: 'var(--stone)', fontFamily: 'Inter, sans-serif' }}>PNG</span>
            </div>
            {/* Simulated scanned page */}
            <div style={{ background: '#faf9f6', border: '1px solid var(--border)', borderRadius: 12, padding: '16px 14px', flex: 1, position: 'relative', overflow: 'hidden' }}>
              {/* Scan line */}
              <div style={{ position: 'absolute', right: 0, left: 0, height: 2, top: `calc(12px + ${scanPos}% * 0.85)`, background: 'linear-gradient(to left, transparent, rgba(246,146,81,0.7), transparent)', boxShadow: '0 0 6px rgba(246,146,81,0.5)', transition: 'top 0.04s linear', zIndex: 2 }}></div>
              {/* Page content lines */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 9, direction: 'rtl' }}>
                {[
                  { w: '100%', dark: true },
                  { w: '88%', dark: false },
                  { w: '94%', dark: false },
                  { w: '82%', dark: false },
                  { w: '90%', dark: false },
                  { w: '96%', dark: false },
                  { w: '76%', dark: false },
                  { w: '88%', dark: false },
                  { w: '92%', dark: false },
                  { w: '68%', dark: false },
                ].map((l, i) => (
                  <div key={i} style={{ height: i === 0 ? 8 : 6, background: l.dark ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.11)', borderRadius: 2, width: l.w }}></div>
                ))}
              </div>
              {/* Corner bracket overlay */}
              <svg style={{ position: 'absolute', top: 8, right: 8, width: 24, height: 24, opacity: 0.5 }} viewBox="0 0 24 24" fill="none">
                <path d="M2 8 L2 2 L8 2" stroke="#f69251" strokeWidth="1.5" strokeLinecap="round"/>
                <path d="M16 2 L22 2 L22 8" stroke="#f69251" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
          </div>

          {/* CENTER: arrow + progress */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '20px 0', borderLeft: '1px solid var(--border-sub)' }}>
            <div style={{ width: 1, flex: 1, background: 'var(--border-sub)' }}></div>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--orange-soft)', border: '1px solid rgba(246,146,81,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <span style={{ color: 'var(--orange)', fontSize: 13, lineHeight: 1 }}>←</span>
            </div>
            {/* Processing indicator */}
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width: 4, height: 4, borderRadius: '50%', background: 'var(--orange)', animation: `pulse-dot 1.2s ease-in-out infinite`, animationDelay: `${i * 0.3}s`, opacity: 0.7 }}></div>
              ))}
            </div>
            <div style={{ width: 1, flex: 1, background: 'var(--border-sub)' }}></div>
          </div>

          {/* RIGHT: extracted text */}
          <div style={{ padding: '20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
              <span style={{ fontSize: 11, color: 'var(--orange)', fontFamily: 'Tajawal, sans-serif', fontWeight: 500 }}>النص المستخرج</span>
              <span style={{ fontSize: 10, background: 'var(--orange-soft)', border: '1px solid rgba(246,146,81,0.2)', borderRadius: 4, padding: '2px 8px', color: 'var(--orange)', fontFamily: 'Inter, sans-serif' }}>٩٨٪ دقة</span>
            </div>
            <div style={{ background: 'var(--fog)', borderRadius: 12, padding: '16px', flex: 1, direction: 'rtl', overflow: 'hidden', position: 'relative' }}>
              <div style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 14, lineHeight: 2.1, color: 'var(--midnight)' }}>
                {sampleLines.map((line, i) => {
                  const lineStart = i * 20;
                  const visible = Math.max(0, Math.min(line.text.length, Math.round((textVisible - lineStart) * line.text.length / 20)));
                  return (
                    <div key={i} style={{ marginBottom: 2 }}>
                      <span style={{ color: line.highlight ? 'var(--orange)' : 'var(--midnight)', fontWeight: line.highlight ? 500 : 400 }}>
                        {line.text.slice(0, visible)}
                      </span>
                      {visible < line.text.length && (
                        <span style={{ display: 'inline-block', width: 2, height: '1em', background: 'var(--orange)', verticalAlign: 'middle', marginRight: 1, animation: 'pulse-dot 0.8s ease-in-out infinite' }}></span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

        </div>

        {/* Status footer */}
        <div style={{ background: 'var(--fog)', borderTop: '1px solid var(--border-sub)', padding: '10px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ display: 'flex', gap: 20 }}>
            {[
              { l: 'النموذج', v: 'Claude Sonnet' },
              { l: 'الصفحة', v: `${Math.round(scanPos / 10 + 1)} / ٢٤٠` },
              { l: 'الدقة', v: '٩٨.٢٪' },
            ].map((s, i) => (
              <div key={i} style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                <span style={{ fontSize: 11, color: 'var(--pebble)', fontFamily: 'Tajawal, sans-serif' }}>{s.l}:</span>
                <span style={{ fontSize: 11, color: 'var(--stone)', fontFamily: 'Tajawal, sans-serif', fontWeight: 500 }}>{s.v}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--orange)', animation: 'pulse-dot 1.2s ease-in-out infinite' }}></div>
            <span style={{ fontSize: 11, color: 'var(--orange)', fontFamily: 'Tajawal, sans-serif', fontWeight: 500 }}>جارٍ المعالجة</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   HERO
══════════════════════════════════ */
function Hero({ onNavigate }) {
  return (
    <section style={{ minHeight: '100vh', background: 'var(--fog)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '110px 28px 80px', position: 'relative' }}>
      {/* Subtle radial on white */}
      <div style={{ position: 'absolute', top: 0, left: '50%', transform: 'translateX(-50%)', width: '80%', height: '60%', background: 'radial-gradient(ellipse 80% 50% at 50% 0%, rgba(246,146,81,0.05) 0%, transparent 60%)', pointerEvents: 'none' }}></div>

      {/* Eyebrow */}
      <div className="badge" style={{ marginBottom: 32 }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--orange)', flexShrink: 0, animation: 'pulse-dot 2s ease-in-out infinite' }}></div>
        مدعوم بـ Claude Vision · Anthropic
      </div>

      {/* Headline */}
      <h1 style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 'clamp(40px, 6vw, 72px)', fontWeight: 300, color: 'var(--carbon)', lineHeight: 1.13, letterSpacing: '-0.025em', maxWidth: 760, marginBottom: 24 }}>
        التراث العربي،
        <br />
        <span style={{ color: 'var(--stone)' }}>نصاً قابلاً للبحث</span>
      </h1>

      {/* Sub */}
      <p style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 18, color: 'var(--stone)', lineHeight: 1.7, maxWidth: 500, marginBottom: 40, fontWeight: 300 }}>
        حوِّل الكتب العربية المصوّرة إلى نصوص رقمية دقيقة في دقائق. من المخطوطات القديمة إلى المطبوعات الحديثة.
      </p>

      {/* CTA */}
      <div style={{ display: 'flex', gap: 12, marginBottom: 40, flexWrap: 'wrap', justifyContent: 'center' }}>
        <button className="btn-primary" style={{ fontSize: 16, padding: '14px 32px' }} onClick={() => onNavigate('register')}>
          ابدأ مجاناً — ٥٠ صفحة
        </button>
        <button className="btn-ghost" style={{ fontSize: 16, padding: '14px 32px' }} onClick={() => onNavigate('dashboard')}>
          شاهد العرض التجريبي
        </button>
      </div>

      {/* Trust */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 64 }}>
        {[
          { stars: true, text: 'دقة ٩٨٪+ في العربية' },
          null,
          { stars: true, text: 'يدعم المخطوطات القديمة' },
          null,
          { icon: '🔒', text: 'بياناتك مشفرة بالكامل' },
        ].map((t, i) => t === null
          ? <div key={i} style={{ width: 1, height: 14, background: 'var(--border)' }}></div>
          : <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              {t.stars && <span style={{ color: 'var(--orange)', letterSpacing: '1px', fontSize: 12 }}>★★★★★</span>}
              {t.icon && <span style={{ fontSize: 13 }}>{t.icon}</span>}
              <span style={{ fontSize: 13, color: 'var(--stone)', fontFamily: 'Tajawal, sans-serif' }}>{t.text}</span>
            </div>
        )}
      </div>

      {/* Mockup */}
      <BookToTextMockup />
    </section>
  );
}

/* ══════════════════════════════════
   STATS BAND
══════════════════════════════════ */
function Stats() {
  return (
    <div style={{ background: 'var(--snow)', borderTop: '1px solid var(--border-sub)', borderBottom: '1px solid var(--border-sub)' }}>
      <div className="container">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)' }}>
          {[

function UploadSection() {
  const [dragging, setDragging] = useState(false);
  const [files, setFiles] = useState([]);
  const [model, setModel] = useState('sonnet');
  const [uploading, setUploading] = useState(false);
  const [done, setDone] = useState(false);

  const handleUpload = () => {
    if (!files.length) return;
    setUploading(true);
    setTimeout(() => { setUploading(false); setDone(true); }, 2000);
  };

  return (
    <div>
      <h1 style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 26, fontWeight: 400, color: 'var(--carbon)', marginBottom: 28 }}>رفع ملف جديد</h1>
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={e => { e.preventDefault(); setDragging(false); setFiles(f => [...f, ...Array.from(e.dataTransfer.files)]); }}
        onClick={() => document.getElementById('fi2').click()}
        style={{ border: `2px dashed ${dragging ? 'var(--orange)' : 'var(--border)'}`, borderRadius: 20, padding: '52px 24px', textAlign: 'center', background: dragging ? 'var(--orange-soft)' : 'var(--snow)', cursor: 'pointer', transition: 'all 0.2s', marginBottom: 20 }}
      >
        <div style={{ fontSize: 44, marginBottom: 14 }}>📂</div>
        <p style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 16, fontWeight: 500, color: 'var(--carbon)', marginBottom: 6 }}>اسحب ملفاتك هنا أو اضغط للاختيار</p>
        <p style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 13, color: 'var(--stone)', fontWeight: 300 }}>PDF · PNG · JPG · TIFF · حتى ٥٠٠ ميجابايت</p>
        <input id="fi2" type="file" multiple style={{ display: 'none' }} onChange={e => setFiles(f => [...f, ...Array.from(e.target.files)])} />
      </div>
      {files.length > 0 && (
        <div className="card" style={{ borderRadius: 16, marginBottom: 18, padding: '16px 20px' }}>
          {files.map((f, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: i < files.length-1 ? '1px solid var(--border-sub)' : 'none' }}>
              <span>📄</span>
              <span style={{ flex: 1, fontSize: 13, color: 'var(--carbon)', fontFamily: 'Tajawal, sans-serif' }}>{f.name || 'ملف.pdf'}</span>
              <button onClick={() => setFiles(files.filter((_,j)=>j!==i))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--pebble)', fontSize: 18, lineHeight: 1 }}>×</button>
            </div>
          ))}
        </div>
      )}
      <div className="card" style={{ borderRadius: 16, marginBottom: 18 }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--carbon)', fontFamily: 'Tajawal, sans-serif', marginBottom: 14 }}>اختر النموذج</div>
        {[{k:'haiku',l:'Claude Haiku',d:'سريع وفعّال',t:'مجاني'},{k:'sonnet',l:'Claude Sonnet',d:'متوازن · موصى به',t:'احترافي'},{k:'opus',l:'Claude Opus',d:'أعلى دقة للمخطوطات الصعبة',t:'مؤسسي'}].map(m => (
          <label key={m.k} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '13px 14px', border: `1.5px solid ${model===m.k?'var(--orange)':'var(--border)'}`, borderRadius: 12, cursor: 'pointer', background: model===m.k?'var(--orange-soft)':'transparent', marginBottom: 8, transition: 'all 0.15s' }}>
            <input type="radio" name="model2" checked={model===m.k} onChange={() => setModel(m.k)} style={{ accentColor: 'var(--orange)', flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--carbon)', fontFamily: 'Tajawal, sans-serif' }}>{m.l}</div>
              <div style={{ fontSize: 12, color: 'var(--stone)', fontFamily: 'Tajawal, sans-serif', fontWeight: 300 }}>{m.d}</div>
            </div>
            <span className="badge" style={{ fontSize: 10 }}>{m.t}</span>
          </label>
        ))}
      </div>
      <button className="btn-primary" style={{ fontSize: 15, padding: '13px 32px', opacity: files.length===0?0.4:1 }} disabled={files.length===0 || uploading || done} onClick={handleUpload}>
        {done ? '✓ تم إرسال الوظيفة' : uploading ? 'جارٍ الرفع...' : `ابدأ المعالجة${files.length>0?` (${files.length} ملف)`:''}`}
      </button>
    </div>
  );
}

    <div style={{ position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 4, zIndex: 200, background: 'var(--snow)', borderRadius: 'var(--r-badge)', padding: '6px', boxShadow: '0 4px 24px rgba(0,0,0,0.12), 0 0 0 1px var(--border)' }}>
      {pages.map(p => (
        <button key={p.k} onClick={() => onNavigate(p.k)} style={{ padding: '8px 18px', border: 'none', borderRadius: 'var(--r-badge)', background: page === p.k ? 'var(--orange)' : 'transparent', color: page === p.k ? '#fff' : 'var(--stone)', fontSize: 13, fontWeight: page === p.k ? 500 : 400, cursor: 'pointer', transition: 'all 0.15s', fontFamily: 'Tajawal, sans-serif', whiteSpace: 'nowrap' }}>{p.l}</button>
      ))}
    </div>
  );
}

/* ══════════════════════════════════
   PRICING PAGE
══════════════════════════════════ */
function PricingPage({ onNavigate }) {
  return (
    <div style={{ minHeight: '100vh', background: 'var(--fog)' }}>
      <Nav onNavigate={onNavigate} />
      <div style={{ paddingTop: 88 }}>
        <Pricing onNavigate={onNavigate} standalone={true} />
        {/* FAQ */}
        <div style={{ maxWidth: 640, margin: '0 auto', padding: '0 28px 80px' }}>
          <h2 style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 28, fontWeight: 300, color: 'var(--carbon)', letterSpacing: '-0.01em', marginBottom: 28 }}>أسئلة شائعة</h2>
          {[
            { q: 'هل يمكنني ترقية خطتي لاحقاً؟', a: 'نعم، يمكنك الترقية أو التخفيض في أي وقت. الفرق يُحتسب تلقائياً.' },
            { q: 'ما صيغ الدفع المقبولة؟', a: 'نقبل mada وVisa وMastercard وApple Pay وSTC Pay عبر Stripe وTap Payments.' },
            { q: 'هل بياناتي آمنة؟', a: 'نعم. ملفاتك مشفرة أثناء النقل والتخزين. لا نشارك بياناتك مع أي طرف ثالث.' },
            { q: 'ماذا يحدث عند تجاوز حصة الصفحات؟', a: 'يمكنك شراء صفحات إضافية (PAYG) دون الترقية للخطة التالية.' },
          ].map((faq, i) => <FAQItem key={i} {...faq} />)}
        </div>
      </div>
      <Footer onNavigate={onNavigate} />
    </div>
  );
}

function FAQItem({ q, a }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ borderBottom: '1px solid var(--border-sub)', padding: '18px 0' }}>
      <button onClick={() => setOpen(!open)} style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'right' }}>
        <span style={{ fontSize: 15, fontWeight: 500, color: 'var(--carbon)', fontFamily: 'Tajawal, sans-serif' }}>{q}</span>
        <span style={{ color: 'var(--orange)', fontSize: 20, transform: open ? 'rotate(45deg)' : 'none', transition: 'transform 0.2s', flexShrink: 0, marginRight: 16 }}>+</span>
      </button>
      {open && <p style={{ marginTop: 10, fontSize: 14, color: 'var(--stone)', lineHeight: 1.65, fontFamily: 'Tajawal, sans-serif', fontWeight: 300 }}>{a}</p>}
    </div>
  );
}

/* ══════════════════════════════════
   LANDING PAGE
══════════════════════════════════ */
function LandingPage({ onNavigate }) {
  return (
    <>
      <Nav onNavigate={onNavigate} />
      <main>
        <Hero onNavigate={onNavigate} />
        <Stats />
        <Features />
        <HowItWorks />
        <Testimonials />
        <Pricing onNavigate={onNavigate} />
        <CTABand onNavigate={onNavigate} />
      </main>
      <Footer onNavigate={onNavigate} />
    </>
  );
}

/* ══════════════════════════════════
   ROOT APP
══════════════════════════════════ */
function App() {
  const [page, setPage] = useState('landing');
  const navigate = p => { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  return (
    <>
      {page === 'landing'   && <LandingPage onNavigate={navigate} />}
      {(page === 'login' || page === 'register') && <AuthPage mode={page} onNavigate={navigate} />}
      {page === 'pricing'   && <PricingPage onNavigate={navigate} />}
      {page === 'dashboard' && <Dashboard onNavigate={navigate} />}
      <DemoNav page={page} onNavigate={navigate} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
