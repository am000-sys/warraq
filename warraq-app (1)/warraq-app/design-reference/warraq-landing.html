<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وَرَّاق — تحويل الكتب العربية إلى نصوص</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="warraq-tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
/* ── Page-level overrides ── */
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400&display=swap');

body { direction: rtl; }

/* NAV */
.nav-wrap {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 48px); max-width: 1160px;
  z-index: 100;
}
.nav {
  background: var(--color-snow);
  border-radius: var(--r-nav);
  box-shadow: var(--shadow-nav);
  padding: 0 var(--sp-24);
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--sp-24);
}
.nav-logo {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 20px; font-weight: 500;
  color: var(--color-carbon);
  letter-spacing: -0.02em;
  text-decoration: none;
  white-space: nowrap;
}
.nav-logo span { color: var(--color-tangerine); }
.nav-links {
  display: flex; align-items: center; gap: var(--sp-32);
  list-style: none;
}
.nav-links a {
  font-size: 14px; font-weight: 400; color: var(--color-stone);
  letter-spacing: -0.01em; text-decoration: none;
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--color-carbon); }
.nav-right { display: flex; align-items: center; gap: var(--sp-12); }
.nav-login {
  font-size: 14px; font-weight: 500; color: var(--color-carbon);
  text-decoration: none; padding: 8px 16px;
  border-radius: var(--r-btn); transition: background 0.15s;
}
.nav-login:hover { background: var(--color-fog); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 120px var(--sp-24) var(--sp-80);
  position: relative; overflow: hidden;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--color-snow);
  border: 1px solid var(--color-border);
  border-radius: var(--r-badge);
  padding: 6px 14px;
  font-size: 13px; font-weight: 500; color: var(--color-graphite);
  margin-bottom: var(--sp-32);
}
.hero-eyebrow .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-tangerine);
  flex-shrink: 0;
}
.hero h1 {
  font-family: 'IBM Plex Sans Arabic', 'Satoshi', sans-serif;
  font-size: clamp(40px, 6vw, 70px);
  font-weight: 300;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--color-carbon);
  max-width: 800px;
  margin-bottom: var(--sp-24);
}
.hero h1 em { font-style: normal; color: var(--color-stone); }
.hero-sub {
  font-size: clamp(16px, 2vw, 20px);
  color: var(--color-stone);
  line-height: 1.6;
  max-width: 520px;
  margin-bottom: var(--sp-40);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-weight: 400;
}
.hero-cta-row {
  display: flex; align-items: center; gap: var(--sp-16);
  margin-bottom: var(--sp-40);
  flex-wrap: wrap; justify-content: center;
}
.hero-trust {
  display: flex; align-items: center; gap: var(--sp-24);
  flex-wrap: wrap; justify-content: center;
}
.trust-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--color-stone);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.stars { color: var(--color-tangerine); letter-spacing: 2px; }

/* BROWSER MOCKUP */
.hero-mockup {
  margin-top: var(--sp-64);
  width: 100%; max-width: 900px;
  position: relative;
}
.mockup-card {
  background: var(--color-snow);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-card), 0 20px 60px rgba(0,0,0,0.06);
  overflow: hidden;
}
.mockup-bar {
  background: var(--color-fog);
  border-bottom: 1px solid var(--color-border-subtle);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 8px;
}
.mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
.mockup-body {
  display: grid; grid-template-columns: 220px 1fr;
  min-height: 340px;
}
.mockup-sidebar {
  background: var(--color-fog);
  border-left: 1px solid var(--color-border-subtle);
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.mock-nav-item {
  height: 32px; border-radius: 8px;
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
  font-size: 13px;
}
.mock-nav-item.active {
  background: var(--color-snow);
  box-shadow: var(--shadow-card);
  color: var(--color-carbon); font-weight: 500;
}
.mock-nav-item:not(.active) { color: var(--color-stone); }
.mock-icon { width: 14px; height: 14px; border-radius: 3px; background: var(--color-pebble); flex-shrink: 0; }
.mock-icon.orange { background: var(--color-tangerine); }
.mockup-main { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.mock-header { display: flex; justify-content: space-between; align-items: center; }
.mock-title { font-size: 14px; font-weight: 500; color: var(--color-carbon); }
.mock-badge-small {
  background: rgba(246,146,81,0.12);
  color: var(--color-tangerine);
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 100px;
}
.mock-page-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.mock-page {
  background: var(--color-fog);
  border-radius: 8px;
  aspect-ratio: 3/4;
  position: relative; overflow: hidden;
}
.mock-page.done::after {
  content: '✓';
  position: absolute; top: 6px; right: 6px;
  width: 16px; height: 16px;
  background: var(--color-tangerine);
  color: white; font-size: 9px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.mock-lines { padding: 10px; display: flex; flex-direction: column; gap: 4px; }
.mock-line {
  height: 4px; background: var(--color-border);
  border-radius: 2px;
}
.mock-text-preview {
  background: var(--color-fog);
  border-radius: 12px;
  padding: 16px;
}
.mock-text-line {
  height: 10px; background: var(--color-border); border-radius: 3px;
  margin-bottom: 8px;
}
.mock-text-line:last-child { width: 60%; margin-bottom: 0; }
.mockup-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, rgba(247,247,247,0.8), transparent);
  pointer-events: none;
}

/* FEATURES SECTION */
.section { padding: var(--sp-96) var(--sp-24); }
.section-label {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--color-fog);
  border: 1px solid var(--color-border);
  border-radius: var(--r-badge);
  padding: 4px 12px;
  font-size: 12px; font-weight: 500; color: var(--color-graphite);
  margin-bottom: var(--sp-20);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.section-heading {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: clamp(30px, 4vw, 50px);
  font-weight: 300;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--color-carbon);
  margin-bottom: var(--sp-16);
}
.section-sub {
  font-size: 17px; color: var(--color-stone); line-height: 1.6;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  max-width: 480px;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-24);
  margin-top: var(--sp-64);
}
.feature-card {
  background: var(--color-snow);
  border-radius: var(--r-card);
  padding: var(--sp-32);
  box-shadow: var(--shadow-card);
  display: flex; flex-direction: column; gap: var(--sp-16);
  transition: box-shadow 0.2s;
}
.feature-card:hover { box-shadow: rgba(24,24,37,0.16) 0px 4px 12px -2px; }
.feature-icon {
  width: 44px; height: 44px;
  background: var(--color-fog);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.feature-title {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 18px; font-weight: 500; color: var(--color-carbon);
  letter-spacing: -0.01em;
}
.feature-desc {
  font-size: 14px; color: var(--color-stone); line-height: 1.6;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* STATS BAND */
.stats-band {
  background: var(--color-snow);
  border-top: 1px solid var(--color-border-subtle);
  border-bottom: 1px solid var(--color-border-subtle);
  padding: var(--sp-48) var(--sp-24);
}
.stats-row {
  max-width: var(--max-w); margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--color-border-subtle);
}
.stat-cell {
  background: var(--color-snow);
  padding: var(--sp-32) var(--sp-24);
  text-align: center;
}
.stat-num {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 42px; font-weight: 300; color: var(--color-carbon);
  letter-spacing: -0.03em; line-height: 1;
  margin-bottom: 8px;
}
.stat-num span { color: var(--color-tangerine); }
.stat-label {
  font-size: 13px; color: var(--color-stone);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* HOW IT WORKS */
.how-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: var(--sp-64);
  align-items: center;
  margin-top: var(--sp-64);
}
.how-steps { display: flex; flex-direction: column; gap: var(--sp-32); }
.how-step { display: flex; gap: var(--sp-20); align-items: flex-start; }
.step-num {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--color-fog);
  border: 1px solid var(--color-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; color: var(--color-stone);
}
.step-num.active {
  background: var(--color-tangerine);
  border-color: var(--color-tangerine);
  color: var(--color-snow);
}
.step-content { flex: 1; }
.step-title {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 16px; font-weight: 500; color: var(--color-carbon);
  margin-bottom: 6px;
}
.step-desc {
  font-size: 14px; color: var(--color-stone); line-height: 1.6;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.how-visual {
  background: var(--color-snow);
  border-radius: var(--r-card);
  padding: var(--sp-32);
  box-shadow: var(--shadow-card);
  min-height: 360px;
  display: flex; flex-direction: column; gap: var(--sp-16);
}

/* TESTIMONIALS */
.testimonials-section {
  padding: var(--sp-96) 0;
  overflow: hidden;
}
.testimonials-header {
  padding: 0 var(--sp-24);
  max-width: var(--max-w); margin: 0 auto var(--sp-48);
}
.testimonials-track {
  display: flex; gap: var(--sp-24);
  padding: var(--sp-16) var(--sp-24);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.testimonials-track::-webkit-scrollbar { display: none; }
.testimonial-card {
  flex: 0 0 320px;
  background: var(--color-snow);
  border-radius: var(--r-card);
  padding: var(--sp-24);
  box-shadow: var(--shadow-card);
}
.t-quote {
  font-size: 14px; color: var(--color-midnight);
  line-height: 1.65;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  margin-bottom: var(--sp-20);
}
.t-author { display: flex; align-items: center; gap: var(--sp-12); }
.t-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--color-fog);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; color: var(--color-stone);
  flex-shrink: 0;
}
.t-name { font-size: 14px; font-weight: 500; color: var(--color-carbon); }
.t-role { font-size: 12px; color: var(--color-stone); }

/* PRICING PREVIEW */
.pricing-preview {
  padding: var(--sp-96) var(--sp-24);
  text-align: center;
}
.pricing-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-24); margin-top: var(--sp-48);
  max-width: 900px; margin-left: auto; margin-right: auto;
}
.pricing-card {
  background: var(--color-snow);
  border-radius: var(--r-card);
  padding: var(--sp-32);
  box-shadow: var(--shadow-card);
  text-align: right;
  position: relative;
}
.pricing-card.featured {
  background: var(--color-deep-slate);
  color: var(--color-snow);
}
.pricing-badge-top {
  position: absolute; top: -12px; right: 24px;
  background: var(--color-tangerine);
  color: var(--color-carbon);
  font-size: 11px; font-weight: 500;
  padding: 3px 12px; border-radius: 100px;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.pricing-tier {
  font-size: 12px; font-weight: 500; color: var(--color-stone);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: var(--sp-16);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.pricing-card.featured .pricing-tier { color: rgba(255,255,255,0.5); }
.pricing-price {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 40px; font-weight: 300; color: var(--color-carbon);
  letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px;
}
.pricing-card.featured .pricing-price { color: var(--color-snow); }
.pricing-period {
  font-size: 13px; color: var(--color-stone); margin-bottom: var(--sp-24);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.pricing-card.featured .pricing-period { color: rgba(255,255,255,0.5); }
.pricing-features {
  list-style: none; display: flex; flex-direction: column; gap: 10px;
  margin-bottom: var(--sp-32);
}
.pricing-features li {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--color-stone);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.pricing-card.featured .pricing-features li { color: rgba(255,255,255,0.7); }
.check { color: var(--color-tangerine); font-weight: 600; }
.pricing-card.featured .check { color: var(--color-tangerine); }

/* FOOTER */
.footer {
  background: var(--color-snow);
  border-top: 1px solid var(--color-border-subtle);
  padding: var(--sp-64) var(--sp-24) var(--sp-40);
}
.footer-grid {
  max-width: var(--max-w); margin: 0 auto;
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: var(--sp-48); margin-bottom: var(--sp-48);
}
.footer-brand-name {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  font-size: 22px; font-weight: 500; color: var(--color-carbon);
  letter-spacing: -0.02em; margin-bottom: var(--sp-12);
}
.footer-brand-name span { color: var(--color-tangerine); }
.footer-desc {
  font-size: 14px; color: var(--color-stone); line-height: 1.6;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  max-width: 280px;
}
.footer-col-title {
  font-size: 13px; font-weight: 500; color: var(--color-carbon);
  margin-bottom: var(--sp-16);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}
.footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.footer-links a {
  font-size: 13px; color: var(--color-stone); text-decoration: none;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  transition: color 0.15s;
}
.footer-links a:hover { color: var(--color-carbon); }
.footer-bottom {
  max-width: var(--max-w); margin: 0 auto;
  padding-top: var(--sp-32); border-top: 1px solid var(--color-border-subtle);
  display: flex; justify-content: space-between; align-items: center;
}
.footer-copy {
  font-size: 12px; color: var(--color-pebble);
  font-family: 'IBM Plex Sans Arabic', sans-serif;
}

/* Divider */
.divider { height: 1px; background: var(--color-border-subtle); }

/* Page nav links */
.page-nav-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  background: var(--color-fog);
  border: 1px solid var(--color-border);
  border-radius: 8px;
  font-size: 12px; color: var(--color-stone);
  text-decoration: none; cursor: pointer;
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  transition: background 0.15s;
}
.page-nav-link:hover { background: var(--color-snow); color: var(--color-carbon); }

.demo-nav {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 200;
  background: var(--color-snow);
  border-radius: 100px;
  padding: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
}

@media (max-width: 768px) {
  .features-grid, .pricing-cards { grid-template-columns: 1fr; }
  .how-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "arabicFont": "IBM Plex Sans Arabic",
  "accentColor": "#f69251",
  "headingWeight": "300",
  "showEnglish": false
}/*EDITMODE-END*/;

/* ─── NAV ─── */
function Nav({ onNavigate }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <div className="nav-wrap">
      <nav className="nav" style={{ boxShadow: scrolled ? '0 4px 24px rgba(0,0,0,0.10)' : 'var(--shadow-nav)' }}>
        <a href="#" className="nav-logo">وَرَّاق<span>.</span></a>
        <ul className="nav-links">
          <li><a href="#">المميزات</a></li>
          <li><a href="#">كيف يعمل</a></li>
          <li><a href="#" onClick={e => { e.preventDefault(); onNavigate('pricing'); }}>الأسعار</a></li>
          <li><a href="#">API</a></li>
        </ul>
        <div className="nav-right">
          <a href="#" className="nav-login" onClick={e => { e.preventDefault(); onNavigate('login'); }}>تسجيل الدخول</a>
          <button className="btn-primary" style={{ fontSize: 13, padding: '10px 20px' }} onClick={() => onNavigate('register')}>ابدأ مجاناً</button>
        </div>
      </nav>
    </div>
  );
}

/* ─── BROWSER MOCKUP ─── */
function BrowserMockup() {
  return (
    <div className="hero-mockup">
      <div className="mockup-card">
        <div className="mockup-bar">
          <div className="mockup-dot" style={{ background: '#c97b84' }}></div>
          <div className="mockup-dot" style={{ background: '#f69251' }}></div>
          <div className="mockup-dot" style={{ background: '#8b8b8b' }}></div>
          <div style={{ flex: 1, marginRight: 12 }}>
            <div style={{ background: '#f0f0f0', borderRadius: 6, height: 22, display: 'flex', alignItems: 'center', padding: '0 10px', fontSize: 11, color: '#949494', direction: 'ltr' }}>
              app.warraq.sa/dashboard
            </div>
          </div>
        </div>
        <div className="mockup-body">
          <div className="mockup-sidebar">
            {[
              { label: 'لوحة التحكم', active: false },
              { label: 'الوظائف', active: true },
              { label: 'النتائج', active: false },
              { label: 'الفوترة', active: false },
            ].map((item, i) => (
              <div key={i} className={`mock-nav-item${item.active ? ' active' : ''}`}>
                <div className={`mock-icon${item.active ? ' orange' : ''}`}></div>
                <span style={{ fontSize: 12, fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{item.label}</span>
              </div>
            ))}
          </div>
          <div className="mockup-main">
            <div className="mock-header">
              <span className="mock-title" style={{ fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>وظائف OCR الأخيرة</span>
              <span className="mock-badge-small">٤ جديد</span>

    e.preventDefault(); setDragging(false);
    const dropped = Array.from(e.dataTransfer.files);
    setFiles(prev => [...prev, ...dropped]);
  };

  const handleFileInput = (e) => {
    const selected = Array.from(e.target.files);
    setFiles(prev => [...prev, ...selected]);
  };

  const handleUpload = () => {
    setUploading(true);
    setTimeout(() => { setUploading(false); setUploaded(true); }, 2000);
    setTimeout(() => { if (onNavigate) onNavigate(); }, 3000);
  };

  return (
    <div>
      <h1 style={{ fontFamily: 'IBM Plex Sans Arabic, sans-serif', fontSize: 28, fontWeight: 400, color: 'var(--color-carbon)', letterSpacing: '-0.01em', marginBottom: 28 }}>رفع ملف جديد</h1>

      {/* Drop zone */}
      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        style={{ border: `2px dashed ${dragging ? 'var(--color-tangerine)' : 'var(--color-border)'}`, borderRadius: 20, padding: '48px 24px', textAlign: 'center', background: dragging ? 'rgba(246,146,81,0.03)' : 'var(--color-snow)', transition: 'all 0.2s', marginBottom: 24, cursor: 'pointer' }}
        onClick={() => document.getElementById('file-input').click()}
      >
        <div style={{ fontSize: 40, marginBottom: 16 }}>📂</div>
        <p style={{ fontFamily: 'IBM Plex Sans Arabic, sans-serif', fontSize: 16, fontWeight: 500, color: 'var(--color-carbon)', marginBottom: 8 }}>اسحب ملفاتك هنا أو اضغط للاختيار</p>
        <p style={{ fontFamily: 'IBM Plex Sans Arabic, sans-serif', fontSize: 13, color: 'var(--color-stone)' }}>يدعم PDF · PNG · JPG · TIFF · حتى ٥٠٠ ميجابايت</p>
        <input id="file-input" type="file" multiple accept=".pdf,.png,.jpg,.jpeg,.tiff" onChange={handleFileInput} style={{ display: 'none' }} />
      </div>

      {/* Files list */}
      {files.length > 0 && (
        <div className="card" style={{ borderRadius: 16, marginBottom: 24 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--color-stone)', fontFamily: 'IBM Plex Sans Arabic, sans-serif', marginBottom: 12 }}>{files.length} ملف مختار</div>
          {files.map((f, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: i < files.length - 1 ? '1px solid var(--color-border-subtle)' : 'none' }}>
              <span style={{ fontSize: 18 }}>{f.name?.includes('.pdf') ? '📄' : '🖼'}</span>
              <span style={{ flex: 1, fontSize: 13, color: 'var(--color-carbon)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{f.name || 'ملف.pdf'}</span>
              <span style={{ fontSize: 11, color: 'var(--color-pebble)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{f.size ? `${(f.size / 1024 / 1024).toFixed(1)} MB` : '2.4 MB'}</span>
              <button onClick={() => setFiles(files.filter((_, j) => j !== i))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-pebble)', fontSize: 16 }}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* Model selection */}
      <div className="card" style={{ borderRadius: 16, marginBottom: 24 }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--color-carbon)', fontFamily: 'IBM Plex Sans Arabic, sans-serif', marginBottom: 16 }}>اختر نموذج المعالجة</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {[
            { key: 'haiku', label: 'Claude Haiku', desc: 'سريع وفعّال • مناسب للكتب الحديثة', tag: 'مجاني' },
            { key: 'sonnet', label: 'Claude Sonnet', desc: 'متوازن بين الدقة والسرعة • موصى به', tag: 'احترافي' },
            { key: 'opus', label: 'Claude Opus', desc: 'أعلى دقة • مثالي للمخطوطات والنصوص القديمة', tag: 'مؤسسي' },
          ].map(m => (
            <label key={m.key} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', border: `1px solid ${model === m.key ? 'var(--color-tangerine)' : 'var(--color-border)'}`, borderRadius: 12, cursor: 'pointer', background: model === m.key ? 'rgba(246,146,81,0.04)' : 'transparent', transition: 'all 0.15s' }}>
              <input type="radio" name="model" value={m.key} checked={model === m.key} onChange={() => setModel(m.key)} style={{ accentColor: 'var(--color-tangerine)', flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--color-carbon)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{m.label}</div>
                <div style={{ fontSize: 12, color: 'var(--color-stone)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{m.desc}</div>
              </div>
              <span className="badge" style={{ fontSize: 10 }}>{m.tag}</span>
            </label>
          ))}
        </div>
      </div>

      <button
        className="btn-primary"
        style={{ fontSize: 15, padding: '14px 32px', opacity: files.length === 0 ? 0.5 : 1 }}
        disabled={files.length === 0 || uploading || uploaded}
        onClick={handleUpload}
      >
        {uploaded ? '✓ تم رفع الوظيفة' : uploading ? 'جارٍ الرفع...' : `ابدأ المعالجة${files.length > 0 ? ` (${files.length} ملف)` : ''}`}
      </button>
    </div>
  );
}

        {section === 'overview' && (
          <>
            <h1 style={{ fontFamily: 'IBM Plex Sans Arabic, sans-serif', fontSize: 26, fontWeight: 400, color: '#fff', letterSpacing: '-0.01em', marginBottom: 28 }}>لوحة الإدارة</h1>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginBottom: 28 }}>
              {[
                { label: 'إجمالي المستخدمين', value: '١,٢٤٧', delta: '+١٢٪', good: true },
                { label: 'الوظائف اليوم', value: '٣٤٢', delta: '+٥٪', good: true },
                { label: 'الإيرادات (مايو)', value: '٨,٤٢٠ ر', delta: '+١٨٪', good: true },
                { label: 'معدل الخطأ', value: '٠.٨٪', delta: '-٢٪', good: true },
              ].map((s, i) => (
                <div key={i} style={{ background: 'rgba(255,255,255,0.05)', borderRadius: 16, padding: '20px', border: '1px solid rgba(255,255,255,0.08)' }}>
                  <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)', fontFamily: 'IBM Plex Sans Arabic, sans-serif', marginBottom: 8 }}>{s.label}</div>
                  <div style={{ fontSize: 26, fontWeight: 300, fontFamily: 'IBM Plex Sans Arabic, sans-serif', color: '#fff', letterSpacing: '-0.02em', marginBottom: 4 }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: s.good ? 'var(--color-tangerine)' : '#c97b84', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{s.delta} هذا الشهر</div>
                </div>
              ))}
            </div>
            {/* Recent users */}
            <div style={{ background: 'rgba(255,255,255,0.04)', borderRadius: 16, padding: 24, border: '1px solid rgba(255,255,255,0.08)', marginBottom: 20 }}>
              <div style={{ fontSize: 14, fontWeight: 500, color: '#fff', fontFamily: 'IBM Plex Sans Arabic, sans-serif', marginBottom: 16 }}>آخر المستخدمين المسجلين</div>
              {[
                { name: 'فاطمة الحربي', email: 'fatima@univ.edu', plan: 'احترافي', date: 'اليوم' },
                { name: 'خالد النمر', email: 'khalid@library.sa', plan: 'مجاني', date: 'اليوم' },
                { name: 'رنا الجابر', email: 'rana@heritage.org', plan: 'مؤسسي', date: 'أمس' },
              ].map((u, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: i < 2 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}>
                  <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'rgba(246,146,81,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: 'var(--color-tangerine)', flexShrink: 0 }}>{u.name[0]}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, color: '#fff', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{u.name}</div>
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)', direction: 'ltr' }}>{u.email}</div>
                  </div>
                  <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 100, background: u.plan === 'مؤسسي' ? 'rgba(246,146,81,0.2)' : 'rgba(255,255,255,0.08)', color: u.plan === 'مؤسسي' ? 'var(--color-tangerine)' : 'rgba(255,255,255,0.5)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{u.plan}</span>
                  <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', fontFamily: 'IBM Plex Sans Arabic, sans-serif' }}>{u.date}</span>
                </div>
              ))}
            </div>
          </>
        )}
        {section !== 'overview' && (
          <div style={{ textAlign: 'center', padding: '120px 0' }}>
            <div style={{ fontSize: 40, marginBottom: 16 }}>🔧</div>
            <p style={{ color: 'rgba(255,255,255,0.4)', fontFamily: 'IBM Plex Sans Arabic, sans-serif', fontSize: 16 }}>قسم {navItems.find(n => n.key === section)?.label} — قيد التطوير</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── DEMO NAV BAR ─── */
function DemoNav({ current, onNavigate }) {
  const pages = [
    { key: 'landing', label: 'الرئيسية' },
    { key: 'login', label: 'دخول' },
    { key: 'pricing', label: 'الأسعار' },
    { key: 'dashboard', label: 'لوحة التحكم' },
    { key: 'admin', label: 'المدير' },
  ];
  return (
    <div className="demo-nav">
      {pages.map(p => (
        <button key={p.key} onClick={() => onNavigate(p.key)} style={{ padding: '7px 14px', border: 'none', borderRadius: 100, background: current === p.key ? 'var(--color-tangerine)' : 'transparent', color: current === p.key ? '#fff' : 'var(--color-stone)', fontSize: 12, fontWeight: current === p.key ? 500 : 400, cursor: 'pointer', transition: 'all 0.15s', fontFamily: 'IBM Plex Sans Arabic, sans-serif', whiteSpace: 'nowrap' }}>
          {p.label}
        </button>
      ))}
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const [page, setPage] = useState('landing');
  const { tweaks } = useTweaks(TWEAK_DEFAULTS);

  const navigate = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <>
      {page === 'landing' && <LandingPage onNavigate={navigate} />}
      {(page === 'login' || page === 'register') && <AuthPage mode={page} onNavigate={navigate} />}
      {page === 'pricing' && <PricingPage onNavigate={navigate} />}
      {page === 'dashboard' && <Dashboard onNavigate={navigate} />}
      {page === 'admin' && <AdminDashboard onNavigate={navigate} />}
      <DemoNav current={page} onNavigate={navigate} />
      <TweaksPanel>
        <TweakSection label="الخط والمحتوى">
          <TweakToggle id="showEnglish" label="English Mode" />
        </TweakSection>
        <TweakSection label="الألوان">
          <TweakColor id="accentColor" label="لون CTA" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>

</body>
</html>
