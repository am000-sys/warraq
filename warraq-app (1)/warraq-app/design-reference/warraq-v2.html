<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وَرَّاق — تحويل الكتب العربية إلى نصوص</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #F5F2EB;
  color: #0D1B2A;
  font-family: 'Tajawal', sans-serif;
  -webkit-font-smoothing: antialiased;
  direction: rtl;
}

:root {
  --navy:   #0D1B2A;
  --navy2:  #122236;
  --navy3:  #1a3050;
  --gold:   #D4AF37;
  --gold2:  #e8c84a;
  --gold3:  rgba(212,175,55,0.12);
  --cream:  #F5F2EB;
  --cream2: #EDE9DF;
  --white:  #FFFFFF;
  --gray:   #6B7280;
  --gray2:  #9CA3AF;
  --border: rgba(13,27,42,0.10);
  --border-gold: rgba(212,175,55,0.25);

  --r-btn: 6px;
  --r-card: 16px;
  --r-nav: 12px;

  --shadow-card: 0 2px 12px rgba(13,27,42,0.08);
  --shadow-gold: 0 4px 20px rgba(212,175,55,0.20);
}

/* ── Utilities ── */
.container { max-width: 1160px; margin: 0 auto; padding: 0 28px; }

.btn-gold {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold);
  color: var(--navy);
  border: none; border-radius: var(--r-btn);
  padding: 12px 26px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 500;
  cursor: pointer;
  box-shadow: var(--shadow-gold);
  transition: all 0.18s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-gold:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(212,175,55,0.30); }

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: var(--r-btn);
  padding: 12px 26px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 400;
  cursor: pointer;
  transition: all 0.18s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.btn-outline-dark {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  color: var(--navy);
  border: 1px solid var(--border);
  border-radius: var(--r-btn);
  padding: 12px 26px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px; font-weight: 400;
  cursor: pointer;
  transition: all 0.18s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-outline-dark:hover { border-color: var(--gold); color: var(--navy); }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--gold3);
  border: 1px solid var(--border-gold);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 500; color: #8B6914;
  letter-spacing: 0.02em;
  font-family: 'Tajawal', sans-serif;
}

.card {
  background: var(--white);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  padding: 28px;
}

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes pulse-gold { 0%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(120px)} }
@keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════════════════
   LOGO SVG COMPONENT
   كتاب مفتوح + إطار مسح + نصوص
══════════════════════════ */
function WarraqLogo({ size = 1, dark = false, showText = true, showTagline = false }) {
  const gold = '#D4AF37';
  const fg = dark ? '#ffffff' : '#0D1B2A';
  const w = 48 * size, h = 48 * size;
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12 * size }}>
      {/* Icon mark */}
      <svg width={w} height={h} viewBox="0 0 48 48" fill="none">
        {/* Scanning frame corners */}
        <path d="M4 14 L4 4 L14 4" stroke={gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M34 4 L44 4 L44 14" stroke={gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M44 34 L44 44 L34 44" stroke={gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M14 44 L4 44 L4 34" stroke={gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {/* Open book */}
        <path d="M24 36 C20 34 13 33 8 34 L8 14 C13 13 20 14 24 16 C28 14 35 13 40 14 L40 34 C35 33 28 34 24 36Z" fill="none" stroke={gold} strokeWidth="1.8" strokeLinejoin="round"/>
        {/* Book spine center line */}
        <line x1="24" y1="16" x2="24" y2="36" stroke={gold} strokeWidth="1.5"/>
        {/* Left page text lines */}
        <line x1="11" y1="20" x2="21" y2="19.5" stroke={dark ? 'rgba(255,255,255,0.5)' : 'rgba(13,27,42,0.35)'} strokeWidth="1.2" strokeLinecap="round"/>
        <line x1="11" y1="24" x2="21" y2="23.5" stroke={dark ? 'rgba(255,255,255,0.5)' : 'rgba(13,27,42,0.35)'} strokeWidth="1.2" strokeLinecap="round"/>
        <line x1="11" y1="28" x2="19" y2="27.6" stroke={dark ? 'rgba(255,255,255,0.5)' : 'rgba(13,27,42,0.35)'} strokeWidth="1.2" strokeLinecap="round"/>
        {/* Right page text lines */}
        <line x1="27" y1="19.5" x2="37" y2="20" stroke={gold} strokeWidth="1.4" strokeLinecap="round"/>
        <line x1="27" y1="23.5" x2="37" y2="24" stroke={gold} strokeWidth="1.2" strokeLinecap="round" opacity="0.6"/>
        <line x1="27" y1="27.6" x2="35" y2="28" stroke={gold} strokeWidth="1.2" strokeLinecap="round" opacity="0.4"/>
      </svg>

      {/* Text */}
      {showText && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 1 }}>
          <span style={{
            fontFamily: 'Tajawal, sans-serif',
            fontSize: 24 * size, fontWeight: 500,
            color: fg, letterSpacing: '-0.02em', lineHeight: 1.1,
          }}>وَرَّاق</span>
          {showTagline && (
            <span style={{ fontSize: 10 * size, color: gold, fontFamily: 'Inter, sans-serif', letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 400 }}>Warraq</span>
          )}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════
   NAV
══════════════════════════ */
function Nav({ onNavigate, page }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(13,27,42,0.97)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(212,175,55,0.12)' : 'none',
      transition: 'all 0.3s ease',
    }}>
      <div className="container" style={{ height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('landing'); }}>
          <WarraqLogo size={0.85} dark={true} showText={true} showTagline={true} />
        </a>
        <nav style={{ display: 'flex', alignItems: 'center', gap: 36 }}>
          {[
            { label: 'المميزات', key: 'features' },
            { label: 'كيف يعمل', key: 'how' },
            { label: 'الأسعار', key: 'pricing' },
            { label: 'API', key: 'api' },
          ].map(item => (
            <a key={item.key} href="#" onClick={e => { e.preventDefault(); onNavigate(item.key === 'pricing' ? 'pricing' : 'landing'); }}
              style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)', textDecoration: 'none', fontFamily: 'Tajawal, sans-serif', fontWeight: 400, transition: 'color 0.15s' }}
              onMouseEnter={e => e.target.style.color='#D4AF37'}
              onMouseLeave={e => e.target.style.color='rgba(255,255,255,0.7)'}
            >{item.label}</a>
          ))}
        </nav>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button className="btn-outline" style={{ fontSize: 14, padding: '9px 20px' }} onClick={() => onNavigate('login')}>تسجيل الدخول</button>
          <button className="btn-gold" style={{ fontSize: 14, padding: '9px 20px' }} onClick={() => onNavigate('register')}>ابدأ مجاناً</button>
        </div>
      </div>
    </header>
  );
}

/* ══════════════════════════
   HERO
══════════════════════════ */
function Hero({ onNavigate }) {
  return (
    <section style={{
      minHeight: '100vh',
      background: `linear-gradient(160deg, #0D1B2A 0%, #122236 50%, #1a2f4a 100%)`,
      display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      textAlign: 'center',
      padding: '120px 28px 80px',
      position: 'relative', overflow: 'hidden',
    }}>
      {/* Background texture */}
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,175,55,0.08) 0%, transparent 60%)', pointerEvents: 'none' }}></div>

      {/* Floating grid dots */}
      {[...Array(20)].map((_,i) => (
        <div key={i} style={{
          position: 'absolute',
          width: 2, height: 2, borderRadius: '50%',
          background: 'rgba(212,175,55,0.3)',
          left: `${5 + (i % 10) * 10}%`,
          top: `${10 + Math.floor(i / 10) * 40}%`,
          animation: `pulse-gold ${2 + (i % 3) * 0.7}s ease-in-out infinite`,
          animationDelay: `${i * 0.15}s`,
        }}></div>
      ))}

      {/* Eyebrow */}
      <div className="badge" style={{ marginBottom: 36, background: 'rgba(212,175,55,0.1)', borderColor: 'rgba(212,175,55,0.3)', color: '#D4AF37' }}>
        <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#D4AF37', flexShrink: 0, display: 'inline-block', animation: 'pulse-gold 2s ease-in-out infinite' }}></span>
        مدعوم بـ Claude Vision من Anthropic
      </div>

      {/* Headline */}
      <h1 style={{
        fontFamily: 'Tajawal, sans-serif',
        fontSize: 'clamp(38px, 6vw, 72px)',
        fontWeight: 300,
        color: '#ffffff',
        lineHeight: 1.15,
        letterSpacing: '-0.02em',
        maxWidth: 780,
        marginBottom: 28,
      }}>
        التراث العربي،<br/>
        <span style={{ color: '#D4AF37' }}>نصاً قابلاً للبحث</span>
      </h1>

      {/* Sub */}
      <p style={{ fontSize: 18, color: 'rgba(255,255,255,0.6)', lineHeight: 1.7, maxWidth: 520, marginBottom: 44, fontWeight: 300 }}>
        حوِّل الكتب العربية المصوّرة — من المخطوطات القديمة إلى المطبوعات الحديثة — إلى نصوص رقمية دقيقة في دقائق.
      </p>

      {/* CTA Row */}
      <div style={{ display: 'flex', gap: 14, marginBottom: 52, flexWrap: 'wrap', justifyContent: 'center' }}>
        <button className="btn-gold" style={{ fontSize: 16, padding: '14px 32px' }} onClick={() => onNavigate('register')}>
          ابدأ مجاناً — ٥٠ صفحة
        </button>
        <button className="btn-outline" style={{ fontSize: 16, padding: '14px 32px' }} onClick={() => onNavigate('dashboard')}>
          شاهد العرض التجريبي ←
        </button>
      </div>

      {/* Trust badges */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 28, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 72 }}>
        {[
          { icon: '★★★★★', text: 'دقة ٩٨٪+ في العربية' },
          { sep: true },
          { icon: '★★★★★', text: 'دعم المخطوطات القديمة' },
          { sep: true },
          { icon: '🔒', text: 'بياناتك آمنة ومشفرة' },
        ].map((t, i) => t.sep
          ? <div key={i} style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.15)' }}></div>
          : <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ color: '#D4AF37', fontSize: 12, letterSpacing: 2 }}>{t.icon}</span>
              <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.55)', fontFamily: 'Tajawal, sans-serif' }}>{t.text}</span>
            </div>
        )}
      </div>

      {/* Book mockup */}
      <BookMockup />
    </section>
  );
}

/* ══════════════════════════
   BOOK MOCKUP
   كتاب → سهم → نص
══════════════════════════ */
function BookMockup() {
  const [scanY, setScanY] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setScanY(y => (y >= 120 ? 0 : y + 2)), 30);
    return () => clearInterval(t);
  }, []);

  return (
    <div style={{ width: '100%', maxWidth: 860, position: 'relative' }}>
      <div style={{
        background: 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(212,175,55,0.15)',
        borderRadius: 20,
        padding: '32px 28px 0',
        backdropFilter: 'blur(8px)',
        overflow: 'hidden',
        boxShadow: '0 32px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06)',
      }}>
        {/* Browser chrome */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20 }}>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#c97b84' }}></div>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#D4AF37' }}></div>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#4a9d5a' }}></div>
          <div style={{ flex: 1, marginRight: 16, background: 'rgba(255,255,255,0.08)', borderRadius: 6, height: 24, display: 'flex', alignItems: 'center', padding: '0 12px' }}>
            <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', fontFamily: 'Inter, sans-serif', direction: 'ltr' }}>app.warraq.sa/jobs/J-1001</span>
          </div>
        </div>

        {/* Two-column layout: book scan + extracted text */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 48px 1fr', gap: 0, minHeight: 260, alignItems: 'stretch' }}>
          {/* Left: scanned book page */}
          <div style={{ background: 'rgba(245,242,235,0.06)', borderRadius: '12px 0 0 0', padding: 20, position: 'relative', overflow: 'hidden' }}>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', marginBottom: 14, fontFamily: 'Tajawal, sans-serif' }}>الصفحة الأصلية</div>
            {/* Page simulation */}
            <div style={{ background: '#F5F2EB', borderRadius: 8, padding: '16px 14px', position: 'relative', overflow: 'hidden' }}>
              {/* Scan line animation */}
              <div style={{ position: 'absolute', right: 0, left: 0, height: 2, top: scanY, background: 'rgba(212,175,55,0.6)', boxShadow: '0 0 8px rgba(212,175,55,0.8)', transition: 'top 0.03s linear' }}></div>
              {/* Simulated Arabic text lines */}
              {[100,85,92,78,88,95,70,83,90,75].map((w, i) => (
                <div key={i} style={{ height: 7, background: i % 3 === 0 ? 'rgba(13,27,42,0.3)' : 'rgba(13,27,42,0.12)', borderRadius: 2, marginBottom: 8, width: `${w}%` }}></div>
              ))}
              {/* Book fold shadow */}
              <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: 'linear-gradient(to right, rgba(0,0,0,0.15), transparent)' }}></div>
            </div>
          </div>

          {/* Center arrow */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 6 }}>
            <div style={{ width: 1, flex: 1, background: 'rgba(212,175,55,0.15)' }}></div>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'rgba(212,175,55,0.12)', border: '1px solid rgba(212,175,55,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <span style={{ color: '#D4AF37', fontSize: 14 }}>←</span>
            </div>
            <div style={{ width: 1, flex: 1, background: 'rgba(212,175,55,0.15)' }}></div>
          </div>

          {/* Right: extracted text */}
          <div style={{ background: 'rgba(212,175,55,0.03)', borderRadius: '0 12px 0 0', padding: 20, borderRight: '1px solid rgba(212,175,55,0.1)' }}>
            <div style={{ fontSize: 11, color: 'rgba(212,175,55,0.7)', marginBottom: 14, fontFamily: 'Tajawal, sans-serif', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span>النص المستخرج</span>
              <span style={{ background: 'rgba(212,175,55,0.15)', color: '#D4AF37', padding: '2px 8px', borderRadius: 4, fontSize: 10 }}>٩٨٪ دقة</span>
            </div>
            <div style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 13, color: 'rgba(255,255,255,0.8)', lineHeight: 2.2, direction: 'rtl' }}>
              <span style={{ color: '#D4AF37' }}>بسم الله</span> الرحمن الرحيم
              <br/>قال الإمام ابن تيمية رحمه
              <br/>الله في فتاواه الكبرى أن
              <br/><span style={{ color: 'rgba(255,255,255,0.4)' }}>الواجب على المسلم...</span>
            </div>
          </div>
        </div>

        {/* Bottom status bar */}
        <div style={{ borderTop: '1px solid rgba(255,255,255,0.06)', padding: '12px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 0 }}>
          <div style={{ display: 'flex', gap: 20 }}>
            {[
              { label: 'النموذج', val: 'Claude Sonnet' },
              { label: 'الصفحات', val: '١٢ / ٢٤٠' },
              { label: 'الوقت المتبقي', val: '٣ دقائق' },
            ].map((s, i) => (
              <div key={i} style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.3)', fontFamily: 'Tajawal, sans-serif' }}>{s.label}:</span>
                <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.7)', fontFamily: 'Tajawal, sans-serif' }}>{s.val}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#D4AF37', animation: 'pulse-gold 1.2s ease-in-out infinite' }}></div>
            <span style={{ fontSize: 11, color: '#D4AF37', fontFamily: 'Tajawal, sans-serif' }}>جارٍ المعالجة</span>
          </div>
        </div>
      </div>

      {/* Bottom fade */}
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 60, background: 'linear-gradient(to top, #1a2f4a, transparent)', pointerEvents: 'none', borderRadius: '0 0 20px 20px' }}></div>
    </div>
  );
}

/* ══════════════════════════
   STATS BAND
══════════════════════════ */
function StatsBand() {
  return (
    <div style={{ background: '#0D1B2A', borderTop: '1px solid rgba(212,175,55,0.12)', borderBottom: '1px solid rgba(212,175,55,0.12)' }}>
      <div className="container">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 0 }}>
          {[
            { num: '+٤م', label: 'صفحة جرى تحويلها' },
            { num: '٩٨٪', label: 'متوسط الدقة' },
            { num: '+١٢٠٠', label: 'باحث يستخدم المنصة' },
            { num: '٣ث', label: 'لكل صفحة' },
          ].map((s, i) => (
            <div key={i} style={{ padding: '40px 28px', textAlign: 'center', borderLeft: i > 0 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}>
              <div style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 44, fontWeight: 300, color: '#D4AF37', letterSpacing: '-0.03em', lineHeight: 1, marginBottom: 8 }}>{s.num}</div>
              <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.45)', fontFamily: 'Tajawal, sans-serif' }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════
   FEATURES
══════════════════════════ */
function Features() {
  const feats = [
    { icon: '✦', title: 'دعم كامل للخطوط العربية', desc: 'نسخ، ثلث، ديواني، رقعة، كوفي — يتعامل مع كل أشكال الخط العربي بما في ذلك المشكول.' },

function UploadSection() {

  return (
    <div>
      <h1 style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 26, fontWeight: 400, color: 'var(--navy)', marginBottom: 28 }}>رفع ملف جديد</h1>

        style={{ border: `2px dashed ${dragging?'var(--gold)':'var(--border)'}`, borderRadius: 16, padding: '52px 24px', textAlign: 'center', background: dragging?'rgba(212,175,55,0.03)':'var(--white)', cursor: 'pointer', transition: 'all 0.2s', marginBottom: 20 }}>

        <p style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 16, fontWeight: 500, color: 'var(--navy)', marginBottom: 8 }}>اسحب ملفاتك هنا أو اضغط للاختيار</p>
        <p style={{ fontFamily: 'Tajawal, sans-serif', fontSize: 13, color: 'var(--gray)' }}>PDF · PNG · JPG · TIFF · حتى ٥٠٠ ميجابايت</p>
        <input id="fi" type="file" multiple style={{ display: 'none' }} onChange={e=>setFiles(f=>[...f,...Array.from(e.target.files)])} />
      </div>
      {files.length > 0 && (
        <div className="card" style={{ borderRadius: 12, marginBottom: 20 }}>
          {files.map((f,i) => (
            <div key={i} style={{ display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:i<files.length-1?'1px solid var(--cream2)':'none' }}>
              <span style={{ fontSize: 18 }}>📄</span>
              <span style={{ flex:1, fontSize:13, color:'var(--navy)', fontFamily:'Tajawal,sans-serif' }}>{f.name||'ملف.pdf'}</span>
              <button onClick={()=>setFiles(files.filter((_,j)=>j!==i))} style={{background:'none',border:'none',cursor:'pointer',color:'var(--gray2)',fontSize:18}}>×</button>
            </div>
          ))}
        </div>
      )}
      <div className="card" style={{ borderRadius: 12, marginBottom: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--navy)', fontFamily: 'Tajawal, sans-serif', marginBottom: 14 }}>اختر النموذج</div>
        {[{k:'haiku',l:'Claude Haiku',d:'سريع وفعّال',t:'مجاني'},{k:'sonnet',l:'Claude Sonnet',d:'متوازن · موصى به',t:'احترافي'},{k:'opus',l:'Claude Opus',d:'أعلى دقة للمخطوطات',t:'مؤسسي'}].map(m => (
          <label key={m.k} style={{ display:'flex',alignItems:'center',gap:12,padding:'13px 14px',border:`1.5px solid ${model===m.k?'var(--gold)':'var(--border)'}`,borderRadius:10,cursor:'pointer',background:model===m.k?'rgba(212,175,55,0.04)':'transparent',marginBottom:8,transition:'all 0.15s' }}>

            <div style={{ flex:1 }}>

              <div style={{ fontSize:12, color:'var(--gray)', fontFamily:'Tajawal,sans-serif' }}>{m.d}</div>
            </div>
            <span style={{ fontSize:10, background:'rgba(212,175,55,0.1)', color:'#8B6914', padding:'2px 8px', borderRadius:4, fontFamily:'Tajawal,sans-serif', border:'1px solid rgba(212,175,55,0.2)' }}>{m.t}</span>

  return (
    <>
      {page === 'landing' && <LandingPage onNavigate={navigate} />}
      {(page === 'login' || page === 'register') && <AuthPage mode={page} onNavigate={navigate} />}
      {page === 'pricing' && <PricingPage onNavigate={navigate} />}
      {page === 'dashboard' && <Dashboard onNavigate={navigate} />}
      <DemoNav page={page} onNavigate={navigate} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
